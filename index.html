<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Room Temperature Status</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Map is always visible */
    #map { height: 560px; width: 100%; display: block; }
    .leaflet-popup-content-wrapper { border-radius: 12px; background: #fffaf5; }
  </style>
</head>
<body>
  <h1>🌡️ Room Temperature</h1>
  
  <div style="margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px;">
    <label for="setpoint">Temperature Setpoint (°C):</label>
    <input type="number" id="setpoint" placeholder="Enter desired temperature" step="0.1" style="padding: 5px; margin-left: 10px; width: 150px;">
    <button onclick="setTemperatureSetpoint()" style="padding: 5px 15px; margin-left: 10px; cursor: pointer;">Set</button>
  </div>

  <p id="temp">Loading...</p>
  <p id="warning" style="color: red; font-weight: bold; display: none; margin-top: 10px;">⚠️ WARNING: Current temperature is HIGHER than setpoint!</p>
  <p id="plc-source" style="margin: 10px 0; font-weight: bold; color: #0066cc;">PLC Source: Unknown</p>

  <script>
    let temperatureSetpoint = localStorage.getItem('temperatureSetpoint') || 25;

    function setTemperatureSetpoint() {
      const input = document.getElementById('setpoint').value;
      if (input === '') {
        alert('Please enter a temperature setpoint');
        return;
      }
      temperatureSetpoint = parseFloat(input);
      localStorage.setItem('temperatureSetpoint', temperatureSetpoint);
      document.getElementById('setpoint').value = '';
      alert(`Temperature setpoint set to ${temperatureSetpoint}°C`);
    }

    function fetchTemperature() {
      fetch("https://temperature-server.onrender.com/temperature")
        .then(res => {
          if (!res.ok) throw new Error('Network response not ok: ' + res.status);
          const ct = res.headers.get('content-type') || '';
          if (ct.includes('application/json')) return res.json();
          // fallback: try to read as text and parse
          return res.text().then(text => {
            try {
              return JSON.parse(text);
            } catch (e) {
              const num = parseFloat(text);
              if (!isNaN(num)) return { temperature: num };
              // give helpful error for debugging
              throw new Error('Unparseable response: ' + text.slice(0, 200));
            }
          });
        })
        .then(data => {
          console.log('temperature response', data);
          const currentTemp = data.temperature;
          document.getElementById('temp').innerText =
            `Current temperature: ${currentTemp} °C | Setpoint: ${temperatureSetpoint}°C`;

          // Extract PLC source and display it
          const plcSource = data.plc || 'Unknown';
          document.getElementById('plc-source').innerText = `PLC Source: ${plcSource}`;

          // Check if current temperature is greater than setpoint
          const warningElement = document.getElementById('warning');
          const isAbove = parseFloat(currentTemp) > parseFloat(temperatureSetpoint);
          if (isAbove) {
            warningElement.style.display = 'block';
            // Show map and update appropriate marker
            showMapIfNeeded();
            updateMarkers(plcSource, true);
            // Send alert to backend
            sendTemperatureAlert(currentTemp, temperatureSetpoint);
          } else {
            warningElement.style.display = 'none';
            updateMarkers(plcSource, false);
          }
        })
        .catch(err => {
          console.error('fetchTemperature error:', err);
          document.getElementById('temp').innerText = "Error fetching data.";
        });
    }

    function sendTemperatureAlert(currentTemp, setpoint) {
      fetch("https://temperature-server.onrender.com/temperature/alert", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          current_temperature: currentTemp,
          threshold_temperature: setpoint
        })
      })
        .then(res => res.json())
        .then(data => {
          console.log("Alert response:", data);
        })
        .catch(err => {
          console.error("Error sending alert:", err);
        });
    }

    // Fetch immediately on page load
    fetchTemperature();

    // Auto-refresh every 5 seconds
    setInterval(fetchTemperature, 5000);

    // Display the stored setpoint on page load and initialize the map (map always visible)
    window.onload = function() {
      document.getElementById('setpoint').placeholder = `Current setpoint: ${temperatureSetpoint}°C`;
      if (typeof initMap === 'function') initMap();
    };
  </script>

  <!-- Inlined Canada map -->
  <section style="margin-top: 30px;">
    <h2>🗺️ Canada Map (PLC Monitoring)</h2>
    <p style="margin-top:0; margin-bottom:8px; color:#555;">Map displays PLC1 (Toronto) and PLC2 (Vancouver) temperature alerts.</p>
    <div style="border:1px solid #ddd; border-radius:6px; overflow:hidden;">
      <div id="map"></div>
    </div>
    <p style="font-size:90%; color:#666; margin-top:8px;">If the map does not load, <a href="../Mapping/canada_map.html" target="_blank" rel="noopener">open it in a new tab</a>.</p>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Initialize map and Toronto marker; called on window.onload
    let torontoMarker = null;
      let vancouverMarker = null;
    
    function initMap() {
      // If map already exists, do nothing (prevents double-initialize error)
      if (window.__leafletMap) return;

      const map = L.map('map', { zoomControl: false }).setView([56, -96], 4);
      // store global reference for later marker operations
      window.__leafletMap = map;

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap, © CARTO'
      }).addTo(map);

        // Markers will be created lazily when needed
        torontoMarker = null;
      vancouverMarker = null;
    }

    // Legacy function - maintained for compatibility
    function updateTorontoMarker(isAbove) {
      // Maintained for backwards compatibility
    }
    
    // Helper to update markers based on PLC: blink yellow for 1s when `isAbove` true
    function updateMarkers(plcSource, isAbove) {
      // If below threshold, remove marker from map (if present)
      if (!isAbove) {
        if (plcSource === 'PLC1' || plcSource === 'plc1') {
          if (torontoMarker && torontoMarker.remove) {
            torontoMarker.remove();
            torontoMarker = null;
          }
        } else if (plcSource === 'PLC2' || plcSource === 'plc2') {
          if (vancouverMarker && vancouverMarker.remove) {
            vancouverMarker.remove();
            vancouverMarker = null;
          }
        }
        return;
      }

      // Above threshold: ensure map and marker exist
      showMapIfNeeded();
      
      if (plcSource === 'PLC1' || plcSource === 'plc1') {
        blinkMarker('toronto');
      } else if (plcSource === 'PLC2' || plcSource === 'plc2') {
        blinkMarker('vancouver');
      }
    }
    
    // Helper function to create and blink a marker
    function blinkMarker(location) {
      let marker = null;
      let coords = null;
      let title = null;
      
      if (location === 'toronto') {
        marker = torontoMarker;
        coords = [43.6532, -79.3832];
        title = 'Toronto (PLC1)';
      } else if (location === 'vancouver') {
        marker = vancouverMarker;
        coords = [49.2827, -123.1207];
        title = 'Vancouver (PLC2)';
      }
      
      if (!marker) {
        marker = L.circleMarker(coords, {
          radius: 12,
          fillColor: '#ffd43b', // start yellow for blink
          color: '#ffffff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.9
        }).addTo(window.__leafletMap).bindPopup(`<strong>${title}</strong>`);
        
        if (location === 'toronto') {
          torontoMarker = marker;
        } else if (location === 'vancouver') {
          vancouverMarker = marker;
        }
      }

      // Blink: toggle visibility every 200ms for 1 second, then set to red
      let blinkCount = 0;
      const maxBlinks = 5; // 5 toggles == ~1s (200ms each)
      const originalFill = '#e63946';
      const blinkColor = '#ffd43b';

      const blinkInterval = setInterval(() => {
        if (!marker) {
          clearInterval(blinkInterval);
          return;
        }
        const visible = (blinkCount % 2) === 0;
        marker.setStyle({ fillColor: visible ? blinkColor : '#ffffff', fillOpacity: visible ? 0.9 : 0.0 });
        blinkCount += 1;
        if (blinkCount >= maxBlinks) {
          clearInterval(blinkInterval);
          // Final state: solid red and open popup
          if (marker) {
            marker.setStyle({ fillColor: originalFill, fillOpacity: 0.9 });
            marker.openPopup();
          }
        }
      }, 200);
    }

    // Show/hide map container (initialize map on first show)
    let mapInitialized = false;
    function showMapIfNeeded() {
      const mapEl = document.getElementById('map');
        if (!mapEl) return;
        if (!mapInitialized) {
          initMap();
          mapInitialized = true;
        }
    }

      function hideMap() {
        // Per requirement: do not hide the map. Only remove marker if present.
                if (vancouverMarker && vancouverMarker.remove) {
                  vancouverMarker.remove();
                  vancouverMarker = null;
                }
        if (torontoMarker && torontoMarker.remove) {
          torontoMarker.remove();
          torontoMarker = null;
        }
      }

    // Keep a global reference to the Leaflet map for marker creation
    // assigned in initMap
  </script>
</body>
</html>
